version: 2
updates:
  # Keep CI actions pinned and patched.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"

  # npm — kicks in once apps/web has a package.json.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    # Group minor + patch into one PR to cut noise; majors go individually so
    # they get a real review.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
